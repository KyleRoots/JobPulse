name: GPT Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  gpt-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: GPT Code Review
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_ENDPOINT: https://api.openai.com/v1
          MODEL: gpt-4o
          LANGUAGE: en
          PROMPT: >
            You are a senior engineer reviewing a FastAPI + Supabase Postgres
            multi-tenant SaaS app hosted on Replit with Bullhorn ATS integration
            and external AI APIs for candidate vetting.
            Focus on: (1) correctness and regressions, (2) error handling and
            resilience, (3) security and tenant isolation, (4) scalability for
            high-volume tenants and webhook traffic, (5) DB query performance.
            For each issue, classify as MUST-FIX, SHOULD-FIX, or NICE-TO-HAVE
            and propose specific code changes and tests.
          MAX_PATCH_LENGTH: 10000
